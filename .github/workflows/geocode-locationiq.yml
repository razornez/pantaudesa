name: LocationIQ Geocode Sweep

# Geocodes desa missing coordinates using LocationIQ (same OpenStreetMap data as
# Nominatim, but with an API key so it works from cloud/datacenter IPs — unlike
# Nominatim, which blocks GitHub Actions runners).
#
# Required repository secrets:
#   DIRECT_URL     — Supabase session-mode (port 5432) connection string
#   LOCATIONIQ_KEY — free API key from https://locationiq.com/
#
# Resumable: --skip-have geoLat only processes desa still missing coordinates,
# so nightly runs chip away at the backlog within the free daily quota (~5,000).

on:
  # 03:00 WIB (20:00 UTC) nightly
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  geocode:
    name: Geocode missing desa coordinates
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Verify required secrets are set
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          LOCATIONIQ_KEY: ${{ secrets.LOCATIONIQ_KEY }}
        run: |
          missing=0
          if [ -z "$DIRECT_URL" ]; then
            echo "::error::Repository secret DIRECT_URL is not set."
            missing=1
          fi
          if [ -z "$LOCATIONIQ_KEY" ]; then
            echo "::error::Repository secret LOCATIONIQ_KEY is not set. Register free at https://locationiq.com/ and add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "Required secrets present."

      - name: Run LocationIQ geocode sweep
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          LOCATIONIQ_KEY: ${{ secrets.LOCATIONIQ_KEY }}
        run: |
          echo "Starting LocationIQ geocode sweep..."
          npx tsx scripts/ingest-run.ts --all --only locationiq --skip-have geoLat
          echo "Done."

      - name: Coverage report
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npx tsx -e "
          const { PrismaClient } = await import('./src/generated/prisma/index.js');
          const db = new PrismaClient();
          const geo = (await db.dataDesa.findMany({where:{fieldKey:'geoLat',isActive:true,status:'PUBLISHED',sourceId:{not:null}},select:{desaId:true},distinct:['desaId']})).length;
          const total = await db.desa.count();
          console.log('geoLat coverage:', geo + '/' + total + ' (' + Math.round(geo/total*100) + '%)');
          await db.\$disconnect();
          "
