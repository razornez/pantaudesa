name: Nominatim Geocode Sweep (DISABLED on cloud — run locally)

# ⚠️ The nightly schedule is intentionally DISABLED.
#
# Nominatim's public API blocks bulk/systematic geocoding from datacenter/cloud
# IPs (GitHub Actions runners). A scheduled run here geocodes ZERO desa and then
# gets killed at the 90-minute job timeout — pure waste. Verified 2026-06-05:
# run 26990527638 ran 89 min, 0 coordinates written.
#
# Geocoding MUST run from a residential IP (local machine). Use:
#   npx tsx scripts/ingest-run.ts --all --only nominatim --skip-have geoLat
#   (or scripts/nominatim-sweep.bat). It is resumable via --skip-have geoLat.
#
# workflow_dispatch is kept only so the job can be triggered manually for
# debugging; it will still be rate-limited/blocked on cloud runners.

on:
  workflow_dispatch:

jobs:
  geocode:
    name: Geocode missing desa coordinates
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Verify DIRECT_URL secret is set
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          if [ -z "$DIRECT_URL" ]; then
            echo "::error::Repository secret DIRECT_URL is not set."
            echo "Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: DIRECT_URL  |  Value: the Supabase session-mode (port 5432) connection string"
            exit 1
          fi
          echo "DIRECT_URL secret is present."

      - name: Run Nominatim geocode sweep
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          echo "Starting Nominatim geocode sweep..."
          npx tsx scripts/ingest-run.ts --all --only nominatim --skip-have geoLat
          echo "Done."

      - name: Coverage report
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npx tsx -e "
          import { config } from 'dotenv';
          const { PrismaClient } = await import('./src/generated/prisma/index.js');
          const db = new PrismaClient();
          const geo = (await db.dataDesa.findMany({where:{fieldKey:'geoLat',isActive:true,status:'PUBLISHED',sourceId:{not:null}},select:{desaId:true},distinct:['desaId']})).length;
          const total = await db.desa.count();
          console.log('geoLat coverage:', geo + '/' + total + ' (' + Math.round(geo/total*100) + '%)');
          await db.\$disconnect();
          "
